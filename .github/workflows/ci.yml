name: Tests

on:
  pull_request:
    paths:
      - 'bosperrus/**'
      - 'tests/**'
      - '.github/workflows/**'
      - 'pyproject.toml'
  push:
    branches: [master]
    paths:
      - 'bosperrus/**'
      - 'tests/**'
      - '.github/workflows/**'
      - 'pyproject.toml'

permissions:
  contents: read

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: pip install -e ".[dev]"

      # compute_centrality_measures requires graph-tool (conda-only, not tested here).
      # All other modules — fitting, model selection, graph construction, distances — are covered.
      - name: Run tests
        run: pytest tests/ -v --tb=short
